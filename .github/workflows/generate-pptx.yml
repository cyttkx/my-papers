name: Generate PPTX and Open PR
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with credentials)
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Generate PPTX
        run: |
          pandoc "presentations/抖音直播互动与购买意愿研究.md" -o "presentations/抖音直播互动与购买意愿研究.pptx"

      - name: Upload PPTX artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-pptx
          path: presentations/抖音直播互动与购买意愿研究.pptx

      - name: Create unique branch name
        run: |
          echo "BRANCH=generate-pptx-$(date +%s)" >> $GITHUB_ENV

      - name: Add and commit generated PPTX
        uses: EndBug/add-and-commit@v9
        with:
          author_name: GitHub Actions
          author_email: actions@github.com
          message: "Generate PPTX from markdown"
          add: "presentations/抖音直播互动与购买意愿研究.pptx"
          new_branch: ${{ env.BRANCH }}
          push: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Generate PPTX from markdown"
          title: "Add generated PPTX"
          body: "This PR adds the generated PPTX from the markdown slides."
          base: main
          branch: ${{ env.BRANCH }}

name: Test generate PPTX artifact
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout (with credentials)"
        uses: actions/checkout@v4

      - name: "Install pandoc"
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: "Generate PPTX (test)"
        run: |
          set -e
          echo "pwd: $(pwd)"
          echo "ls before:"
          ls -la presentations || true
          pandoc "presentations/抖音直播互动与购买意愿研究.md" -o "presentations/抖音直播互动与购买意愿研究.pptx"
          echo "pandoc exit $?"

      - name: "Show presentations dir (test)"
        run: |
          echo "=== ls -la presentations ==="
          ls -la presentations || true
          echo "=== file details ==="
          for f in presentations/*; do echo "---- $f ----"; file "$f" || true; ls -lh "$f" || true; done || true

      - name: "Upload PPTX artifact (test)"
        uses: actions/upload-artifact@v4
        with:
          name: generated-pptx
          path: presentations/抖音直播互动与购买意愿研究.pptx
